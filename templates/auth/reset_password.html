{% extends 'base.html' %}

{% block title %}
Reset Password
{% endblock %}

{% block content %}

<section class="py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-5">

                <div class="auth-card">

                    <h1 class="auth-title">

                        Reset Password

                    </h1>

                    {% if messages %}

                        {% for message in messages %}

                        <div class="alert-box">

                            {{ message }}

                        </div>

                        {% endfor %}

                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <input
                        type="password"
                        name="password"
                        class="auth-input"
                        placeholder="Password baru"
                        required>

                        <input
                        type="password"
                        name="confirm_password"
                        class="auth-input"
                        placeholder="Konfirmasi password"
                        required>

                        <button
                        type="submit"
                        class="auth-btn">

                            Reset Password

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
