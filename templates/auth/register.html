{% extends 'base.html' %}

{% block title %}
Register - FINDIT AI
{% endblock %}

{% block content %}

<section style="
min-height:90vh;
display:flex;
align-items:center;
justify-content:center;
">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-5">

                <div class="card-dark p-5">

                    <div class="text-center mb-4">

                        <div class="logo mb-3">
                            <span>FINDIT</span> AI
                        </div>

                        <p class="text-secondary-custom">
                            Buat akun baru
                        </p>

                    </div>

                    {% if messages %}

                        {% for message in messages %}

                            <div class="alert alert-danger">
                                {{ message }}
                            </div>

                        {% endfor %}

                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-4">

                            <label class="mb-2">
                                Nama Lengkap
                            </label>

                            <input
                            type="text"
                            name="nama_lengkap"
                            class="form-control bg-dark text-white border-0 p-3"
                            required>

                        </div>

                        <div class="mb-4">

                            <label class="mb-2">
                                Nomor WhatsApp
                            </label>

                            <input
                            type="text"
                            name="no_whatsapp"
                            class="form-control bg-dark text-white border-0 p-3"
                            placeholder="08xxxxxxxx"
                            required>

                        </div>

                        <div class="mb-4">

                            <label class="mb-2">
                                Username
                            </label>

                            <input
                            type="text"
                            name="username"
                            class="form-control bg-dark text-white border-0 p-3"
                            required>

                        </div>

                        <div class="mb-4">

                            <label class="mb-2">
                                Password
                            </label>

                            <input
                            type="password"
                            name="password"
                            class="form-control bg-dark text-white border-0 p-3"
                            required>

                        </div>

                        <div class="mb-4">

                            <label class="mb-2">
                                Konfirmasi Password
                            </label>

                            <input
                            type="password"
                            name="confirm_password"
                            class="form-control bg-dark text-white border-0 p-3"
                            required>

                        </div>

                        <button class="btn btn-main w-100 py-3">
                            Daftar
                        </button>

                    </form>

                    <div class="text-center mt-4">

                        <span class="text-secondary-custom">
                            Sudah punya akun?
                        </span>

                        <a href="/login/" style="color:#ff3b57;">
                            Login
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
