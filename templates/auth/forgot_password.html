{% extends 'base.html' %}

{% block title %}
Lupa Password
{% endblock %}

{% block content %}

<section class="py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-5">

                <div class="auth-card">

                    <h1 class="auth-title">

                        Lupa Password

                    </h1>

                    <p class="auth-subtitle">

                        Masukkan nomor WhatsApp Anda

                    </p>

                    {% if messages %}

                        {% for message in messages %}

                        <div class="alert-box">

                            {{ message }}

                        </div>

                        {% endfor %}

                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <input
                        type="text"
                        name="no_whatsapp"
                        class="auth-input"
                        placeholder="628xxxxxxxx"
                        required>

                        <button
                        type="submit"
                        class="auth-btn">

                            Kirim OTP

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

<style>

.auth-card{
    background:#111;
    border:1px solid #222;
    border-radius:24px;
    padding:40px;
}

.auth-title{
    font-size:40px;
    font-weight:700;
    margin-bottom:10px;
}

.auth-subtitle{
    color:#888;
    margin-bottom:30px;
}

.auth-input{
    width:100%;
    padding:16px;
    background:#1b1b1b;
    border:1px solid #2a2a2a;
    border-radius:14px;
    color:white;
    margin-bottom:20px;
}

.auth-btn{
    width:100%;
    border:none;
    background:#ff3b57;
    color:white;
    padding:16px;
    border-radius:14px;
    font-weight:700;
}

.alert-box{
    background:#441111;
    border:1px solid #ff3b57;
    color:#ffb3bd;
    padding:14px;
    border-radius:12px;
    margin-bottom:20px;
}

</style>

{% endblock %}
